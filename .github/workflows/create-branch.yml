name: Create Branch From Issue Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read

jobs:
  create-branch:
    if: startsWith(github.event.comment.body, '/create-branch')
    runs-on: ubuntu-latest

    steps:
      - name: Determine prefix based on labels
        id: prefix
        run: |
          LABELS=$(echo '${{ toJson(github.event.issue.labels) }}' | tr '[:upper:]' '[:lower:]')

          if echo "$LABELS" | grep -q '"bug"'; then
            PREFIX="bugfix"
          elif echo "$LABELS" | grep -q '"documentation"'; then
            PREFIX="doc"
          elif echo "$LABELS" | grep -q '"infrastructure"'; then
            PREFIX="infra"
          else
            PREFIX="feature"
          fi

          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

      - name: Build branch name
        id: vars
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_TITLE="${{ github.event.issue.title }}"

          # slugify title
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g' \
            | sed -E 's/^-+|-+$//g')

          BRANCH="${{ steps.prefix.outputs.prefix }}/${ISSUE_NUMBER}-${SLUG}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Get base branch SHA
        id: sha
        run: |
          SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq .object.sha)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create branch
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            -X POST \
            -f ref="refs/heads/${{ steps.vars.outputs.branch }}" \
            -f sha="${{ steps.sha.outputs.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment back
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="Branch \`${{ steps.vars.outputs.branch }}\` created from \`main\`."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
