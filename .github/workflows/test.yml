name: Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - '**'
    types: [ opened, synchronize, reopened ]

env:
  postgres-password: "postgres"
  tester-password: "ChangeMe!"

jobs:
  test-database-and-server:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ${{ env.postgres-password }}
          POSTGRES_DB: pgutils_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: coursier/cache-action@bebeeb0e6f48ebad66d3783946588ecf43114433

      - name: Setup Scala
        uses: olafurpg/setup-scala@32ffa16635ff8f19cc21ea253a987f0fdf29844c
        with:
          java-version: "adopt@1.11.0-11"

      - name: Prepare testing database
        env:
          PGPASSWORD:  ${{ env.postgres-password }}
        run: |
          psql -h 127.0.0.1 -U postgres -d pgutils_db -f install.psql -v ON_ERROR_STOP=1
          psql -h 127.0.0.1 -U postgres -d pgutils_db -f tests/src/test/resources/test_user.ddl -v ON_ERROR_STOP=1

      - name: Run tests
        run: sbt test
